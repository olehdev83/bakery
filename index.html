<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakery cучасна пекарня</title>
    <link rel="stylesheet" href="./css/fonts.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="header" id="header">
        <div class="container">
            <div class="header-container">
                <nav class="header-nav">
                    <a href="/"><img src="./images/logo.svg" alt="logo"></a>
                    <ul class="menu-header">
                        <li class="header-item"><a href="">Наші традиції</a></li>
                        <li class="header-item"><a href="">Шеф-кухарі</a></li>
                        <li class="header-item"><a href="">Формати</a></li>
                        <li class="header-item"><a href="">Контакти</a></li>
                    </ul>
                </nav>
                    <button class="button" type="button">Замовити дзвінок</button>
            </div>
        </div>
    </header>
    <main>
        <section class="hero" id="hero">
            <div class="container">
                <h1 class="hero-title"><span class="accent">Сучасна</span>пекарня</h1>
            </div>
        </section>
        <section class="advantage" id="advantage">
            <div class="container">
                <h2 class="advantage-title visually-hidden">Наші переваги</h2>
                    <ul class="advantage-list">
                        <li class="advantage-item">Великий попит на ринку</li>
                        <li class="advantage-item">Доступні за бюджетом формати</li>
                        <li class="advantage-item">Досвідчена управлінська команда</li>
                    </ul>
            </div>
        </section>
    </main>
    <footer class="footer" id="footer">
        
    </footer>
</body>
</html>
